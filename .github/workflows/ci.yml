name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov  # coverage

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run unit tests with coverage
        run: pytest tests/ -v --tb=short --cov=step_rl --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Run end-to-end integration test (CPU)
        run: python scripts/end_to_end_test.py
        env:
          HF_HOME: /tmp/huggingface
          PYTHONPATH: ${{ github.workspace }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install lint tools
        run: |
          pip install black isort flake8 mypy bandit

      - name: Check code formatting (black)
        run: black --check --diff step_rl/ tests/ scripts/

      - name: Check import sorting (isort)
        run: isort --check-only --diff step_rl/ tests/ scripts/

      - name: Run flake8
        run: flake8 step_rl/ tests/ scripts/ --max-line-length=120 --extend-ignore=E203,W503,E402

      - name: Run mypy (optional)
        run: mypy step_rl/ --ignore-missing-imports || true

      - name: Run bandit security scan
        run: bandit -r step_rl/ -f json -o bandit-report.json || true

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
